<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Auriz — finanças da família</title>
  <link rel="stylesheet" href="./colors_and_type.css">
  <style>
    html,body,#root{height:100%;margin:0}
    body{background:var(--paper);font-family:var(--font-sans);color:var(--ink);-webkit-font-smoothing:antialiased}
    *{box-sizing:border-box}
    button{font-family:inherit}
    [data-screen-label]{isolation:isolate}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script src="./config.js"></script>
  <script src="./supabase.js"></script>
  <script>
    window.MONTHS_PT=["janeiro","fevereiro","março","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"];
    window.DEMO_FAMILY_ID="a0000000-0000-0000-0000-000000000001";
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="./db.jsx"></script>
  <script type="text/babel" src="./icons.jsx"></script>
  <script type="text/babel" src="./atoms.jsx"></script>
  <script type="text/babel" src="./Sidebar.jsx"></script>
  <script type="text/babel" src="./TopBar.jsx"></script>
  <script type="text/babel" src="./AddTransactionSheet.jsx"></script>
  <script type="text/babel" src="./DashboardScreen.jsx"></script>
  <script type="text/babel" src="./TransactionsScreen.jsx"></script>
  <script type="text/babel" src="./GoalsScreen.jsx"></script>
  <script type="text/babel" src="./EconomiasScreen.jsx"></script>
  <script type="text/babel" src="./CategoriasScreen.jsx"></script>
  <script type="text/babel" src="./TetoScreen.jsx"></script>
  <script type="text/babel" src="./MembrosScreen.jsx"></script>
  <script type="text/babel" src="./DashboardAnalyticsScreen.jsx"></script>
  <script type="text/babel" data-presets="env,react">
    const AppLoading = () => (
      <div style={{height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:20}}>
        <Logo /><Spinner size={24}/>
      </div>
    );

    function App() {
      const FAMILY_ID = window.DEMO_FAMILY_ID;
      const [loading,setLoading]       = React.useState(true);
      const [members,setMembers]       = React.useState([]);
      const [categories,setCategories] = React.useState([]);
      const [active,setActive]         = React.useState("hoje");
      const [month,setMonth]           = React.useState(new Date().getMonth());
      const [year,setYear]             = React.useState(new Date().getFullYear());
      const [sheetOpen,setSheetOpen]   = React.useState(false);

      React.useEffect(() => {
        Promise.all([DB.getMembers(FAMILY_ID), DB.getCategories(FAMILY_ID)])
          .then(([m,c]) => { setMembers(m); setCategories(c); })
          .finally(() => setLoading(false));
      }, []);

      const refreshFamily = () =>
        Promise.all([DB.getMembers(FAMILY_ID), DB.getCategories(FAMILY_ID)])
          .then(([m,c]) => { setMembers(m); setCategories(c); });

      const shiftMonth = (delta) => setMonth(prev => {
        let m = prev + delta;
        if (m < 0)  { setYear(y => y-1); return 11; }
        if (m > 11) { setYear(y => y+1); return 0; }
        return m;
      });

      if (loading) return <AppLoading/>;

      const titles = {
        hoje:      {title:"Hoje",         subtitle:`${MONTHS_PT[month]} · ${new Date().toLocaleDateString("pt-BR",{weekday:"long"})}`.toLowerCase()},
        transacoes:{title:"Transações",   subtitle:`tudo o que entrou e saiu em ${MONTHS_PT[month].toLowerCase()}`},
        dashboard: {title:"Dashboard",    subtitle:"indicadores e padrões do mês"},
        economias: {title:"Economias",    subtitle:"o que vocês têm guardado"},
        metas:     {title:"Metas",        subtitle:"os planos da família"},
        categorias:{title:"Categorias",   subtitle:"como vocês organizam o gasto"},
        teto:      {title:"Teto de gastos",subtitle:"limites por categoria"},
        membros:   {title:"Membros",      subtitle:"quem participa do orçamento"},
      };

      const p = {familyId:FAMILY_ID, month, year};
      const renderScreen = () => {
        switch(active) {
          case "hoje":       return <DashboardScreen {...p} members={members} onAddTransaction={()=>setSheetOpen(true)} onNav={setActive}/>;
          case "transacoes": return <TransactionsScreen {...p} members={members} onAddTransaction={()=>setSheetOpen(true)}/>;
          case "dashboard":  return <DashboardAnalyticsScreen {...p}/>;
          case "economias":  return <EconomiasScreen {...p} members={members}/>;
          case "metas":      return <GoalsScreen {...p} members={members}/>;
          case "categorias": return <CategoriasScreen familyId={FAMILY_ID}/>;
          case "teto":       return <TetoScreen {...p}/>;
          case "membros":    return <MembrosScreen {...p} onMembersChange={refreshFamily}/>;
          default:           return null;
        }
      };

      return (
        <div style={{display:"flex",minHeight:"100vh"}} data-screen-label={`Auriz · ${titles[active]?.title||active}`}>
          <Sidebar active={active} onNav={setActive} members={members}/>
          <main style={{flex:1,display:"flex",flexDirection:"column",minWidth:0}}>
            <TopBar title={titles[active]?.title||""} subtitle={titles[active]?.subtitle||""}
              month={month} year={year} onMonth={shiftMonth} onAddTransaction={()=>setSheetOpen(true)}/>
            <div style={{flex:1}}>{renderScreen()}</div>
          </main>
          <AddTransactionSheet open={sheetOpen} onClose={()=>setSheetOpen(false)}
            familyId={FAMILY_ID} members={members} categories={categories} onSaved={()=>setSheetOpen(false)}/>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
