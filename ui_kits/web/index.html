<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Auriz — finanças da família</title>
  <link rel="stylesheet" href="./colors_and_type.css">
  <style>
    html,body,#root { height:100%; margin:0; }
    body { background:#faf8f4; font-family:system-ui,sans-serif; color:#1a1410; -webkit-font-smoothing:antialiased; }
    * { box-sizing:border-box; }
    button { font-family:inherit; }
    [data-screen-label] { isolation:isolate; }

    /* Spinner puro CSS — visível antes do React carregar */
    #boot-loader {
      position:fixed; inset:0; display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:20px;
      background:#faf8f4; z-index:9999;
    }
    #boot-loader .wordmark {
      font-family:system-ui,sans-serif; font-size:32px; font-weight:600;
      letter-spacing:-0.04em; color:#1a1410;
    }
    #boot-loader .dot { color:#c89b5c; }
    #boot-loader .ring {
      width:24px; height:24px; border:2px solid #e8e0d4;
      border-top-color:#c89b5c; border-radius:50%;
      animation:spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    #boot-loader.hidden { display:none; }
  </style>
</head>
<body>

  <!-- Loader visível imediatamente, antes do React/Babel carregar -->
  <div id="boot-loader">
    <div class="wordmark">auriz<span class="dot">.</span></div>
    <div class="ring"></div>
  </div>

  <div id="root"></div>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <!-- React 18 -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>

  <!-- Babel (precisa de 'unsafe-eval' no CSP) -->
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <!-- Config + Supabase client -->
  <script src="./config.js"></script>
  <script src="./supabase.js"></script>

  <script>
    window.MONTHS_PT = ["janeiro","fevereiro","março","abril","maio","junho",
      "julho","agosto","setembro","outubro","novembro","dezembro"];

    // Esconde o boot-loader nativo assim que o React assumir
    window.__hideBoot = function() {
      var el = document.getElementById('boot-loader');
      if (el) el.classList.add('hidden');
    };

    // Se o Babel/React não carregar em 8s, mostra mensagem de erro
    setTimeout(function() {
      var root = document.getElementById('root');
      if (root && !root.hasChildNodes()) {
        document.getElementById('boot-loader').innerHTML =
          '<div style="text-align:center;padding:32px;max-width:440px">' +
          '<div style="font-size:24px;font-weight:600;margin-bottom:12px">auriz</div>' +
          '<p style="color:#6b6560;font-size:15px;line-height:1.6;margin:0 0 16px">' +
          'Erro ao carregar o app. Tente um <strong>Ctrl+Shift+R</strong> (ou Cmd+Shift+R no Mac) ' +
          'para limpar o cache e recarregar.</p>' +
          '<p style="color:#a09890;font-size:13px">Se o problema persistir, verifique o console do navegador (F12).</p>' +
          '</div>';
      }
    }, 8000);
  </script>

  <!-- Camada de dados -->
  <script type="text/babel" src="./db.jsx"></script>

  <!-- Design system -->
  <script type="text/babel" src="./icons.jsx"></script>
  <script type="text/babel" src="./atoms.jsx"></script>

  <!-- Layout chrome -->
  <script type="text/babel" src="./Sidebar.jsx"></script>
  <script type="text/babel" src="./TopBar.jsx"></script>

  <!-- Auth screens -->
  <script type="text/babel" src="./LoginScreen.jsx"></script>
  <script type="text/babel" src="./SetupScreen.jsx"></script>

  <!-- App screens -->
  <script type="text/babel" src="./AddTransactionSheet.jsx"></script>
  <script type="text/babel" src="./DashboardScreen.jsx"></script>
  <script type="text/babel" src="./TransactionsScreen.jsx"></script>
  <script type="text/babel" src="./GoalsScreen.jsx"></script>
  <script type="text/babel" src="./EconomiasScreen.jsx"></script>
  <script type="text/babel" src="./CategoriasScreen.jsx"></script>
  <script type="text/babel" src="./TetoScreen.jsx"></script>
  <script type="text/babel" src="./MembrosScreen.jsx"></script>
  <script type="text/babel" src="./DashboardAnalyticsScreen.jsx"></script>
  <script type="text/babel" src="./AdminUsuariosScreen.jsx"></script>

  <script type="text/babel" data-presets="env,react">

    // ── Loading splash React ──────────────────────────────────────
    const AppLoading = () => {
      React.useEffect(() => { window.__hideBoot && window.__hideBoot(); }, []);
      return (
        <div style={{ height:"100vh", display:"flex", flexDirection:"column",
          alignItems:"center", justifyContent:"center", gap:20, background:"var(--paper)" }}>
          <Logo height={32}/>
          <Spinner size={22}/>
        </div>
      );
    };

    // ── Tela de erro ──────────────────────────────────────────────
    const AppError = ({ message }) => {
      React.useEffect(() => { window.__hideBoot && window.__hideBoot(); }, []);
      return (
        <div style={{ height:"100vh", display:"flex", flexDirection:"column",
          alignItems:"center", justifyContent:"center", gap:16, padding:32,
          background:"var(--paper)", textAlign:"center" }}>
          <Logo height={28}/>
          <div style={{ fontSize:15, color:"var(--ink-3)", maxWidth:400, lineHeight:1.6 }}>
            {message || "Erro inesperado. Recarregue a página."}
          </div>
          <button onClick={() => window.location.reload()} style={{
            padding:"10px 24px", background:"var(--ink)", color:"var(--paper)",
            border:"none", borderRadius:"var(--r-2)", cursor:"pointer",
            fontFamily:"var(--font-sans)", fontWeight:500, fontSize:14,
          }}>Recarregar</button>
        </div>
      );
    };

    // ── App principal ─────────────────────────────────────────────
    function App() {
      // "loading" | "guest" | "setup" | "app" | "error"
      const [authState,  setAuthState]  = React.useState("loading");
      const [session,    setSession]    = React.useState(null);
      const [family,     setFamily]     = React.useState(null);
      const [members,    setMembers]    = React.useState([]);
      const [categories, setCategories] = React.useState([]);
      const [active,     setActive]     = React.useState("hoje");
      const [month,      setMonth]      = React.useState(new Date().getMonth());
      const [year,       setYear]       = React.useState(new Date().getFullYear());
      const [sheetOpen,  setSheetOpen]  = React.useState(false);
      const [bootError,  setBootError]  = React.useState(null);

      const loadFamily = React.useCallback(async (userId) => {
        try {
          const fam = await DB.getFamilyByUserId(userId);
          if (!fam) { setAuthState("setup"); return; }
          setFamily(fam);
          const [m, c] = await Promise.all([
            DB.getMembers(fam.id),
            DB.getCategories(fam.id),
          ]);
          setMembers(m);
          setCategories(c);
          setAuthState("app");
        } catch(e) {
          console.error("loadFamily error:", e);
          setAuthState("setup");
        }
      }, []);

      React.useEffect(() => {
        let cancelled = false;

        DB.getSession()
          .then(sess => {
            if (cancelled) return;
            if (!sess) { setAuthState("guest"); return; }
            setSession(sess);
            loadFamily(sess.user.id);
          })
          .catch(e => {
            console.error("getSession error:", e);
            if (!cancelled) setAuthState("guest");
          });

        let subscription;
        try {
          const result = sb.auth.onAuthStateChange((event, sess) => {
            if (cancelled) return;
            if (event === "SIGNED_OUT") {
              setAuthState("guest");
              setSession(null);
              setFamily(null);
              setMembers([]);
              setCategories([]);
              setActive("hoje");
            } else if (event === "SIGNED_IN" && sess) {
              setSession(sess);
              loadFamily(sess.user.id);
            } else if (event === "TOKEN_REFRESHED" && sess) {
              setSession(sess);
            }
          });
          subscription = result.data.subscription;
        } catch(e) {
          console.error("onAuthStateChange setup error:", e);
        }

        return () => {
          cancelled = true;
          subscription && subscription.unsubscribe();
        };
      }, [loadFamily]);

      // Esconde boot loader nativo quando React assume
      React.useEffect(() => { window.__hideBoot && window.__hideBoot(); }, []);

      const refreshFamily = () => {
        if (!family) return;
        Promise.all([DB.getMembers(family.id), DB.getCategories(family.id)])
          .then(([m, c]) => { setMembers(m); setCategories(c); })
          .catch(e => console.error("refreshFamily error:", e));
      };

      const handleLogout = async () => {
        try { await DB.signOut(); }
        catch(e) { console.error("signOut error:", e); }
      };

      const shiftMonth = (delta) => setMonth(prev => {
        let m = prev + delta;
        if (m < 0)  { setYear(y => y - 1); return 11; }
        if (m > 11) { setYear(y => y + 1); return 0; }
        return m;
      });

      if (bootError)          return <AppError message={bootError}/>;
      if (authState === "loading") return <AppLoading/>;
      if (authState === "guest")   return <LoginScreen onLogin={() => {}}/>;
      if (authState === "setup")   return (
        <SetupScreen userId={session?.user?.id} onDone={() => loadFamily(session.user.id)}/>
      );

      const FAMILY_ID = family.id;

      const titles = {
        hoje:      { title:"Hoje",           subtitle:`${MONTHS_PT[month]} · ${new Date().toLocaleDateString("pt-BR",{weekday:"long"})}`.toLowerCase() },
        transacoes:{ title:"Transações",     subtitle:`tudo o que entrou e saiu em ${MONTHS_PT[month].toLowerCase()}` },
        dashboard: { title:"Dashboard",      subtitle:"indicadores e padrões do mês" },
        economias: { title:"Economias",      subtitle:"o que vocês têm guardado" },
        metas:     { title:"Metas",          subtitle:"os planos da família" },
        categorias:{ title:"Categorias",     subtitle:"como vocês organizam o gasto" },
        teto:      { title:"Teto de gastos", subtitle:"limites por categoria" },
        membros:   { title:"Membros",        subtitle:"quem participa do orçamento" },
        usuarios:  { title:"Usuários",       subtitle:"acesso e permissões do painel" },
      };

      const p = { familyId: FAMILY_ID, month, year };

      const renderScreen = () => {
        switch (active) {
          case "hoje":       return <DashboardScreen {...p} members={members} onAddTransaction={()=>setSheetOpen(true)} onNav={setActive}/>;
          case "transacoes": return <TransactionsScreen {...p} members={members} onAddTransaction={()=>setSheetOpen(true)}/>;
          case "dashboard":  return <DashboardAnalyticsScreen {...p}/>;
          case "economias":  return <EconomiasScreen {...p} members={members}/>;
          case "metas":      return <GoalsScreen {...p} members={members}/>;
          case "categorias": return <CategoriasScreen familyId={FAMILY_ID}/>;
          case "teto":       return <TetoScreen {...p}/>;
          case "membros":    return <MembrosScreen {...p} onMembersChange={refreshFamily}/>;
          case "usuarios":   return <AdminUsuariosScreen familyId={FAMILY_ID} members={members} onMembersChange={refreshFamily}/>;
          default:           return null;
        }
      };

      return (
        <div style={{ display:"flex", minHeight:"100vh" }}
          data-screen-label={`Auriz · ${titles[active]?.title || active}`}>
          <Sidebar active={active} onNav={setActive} members={members} onLogout={handleLogout}/>
          <main style={{ flex:1, display:"flex", flexDirection:"column", minWidth:0 }}>
            <TopBar
              title={titles[active]?.title || ""}
              subtitle={titles[active]?.subtitle || ""}
              month={month} year={year} onMonth={shiftMonth}
              onAddTransaction={()=>setSheetOpen(true)}
            />
            <div style={{ flex:1 }}>{renderScreen()}</div>
          </main>
          <AddTransactionSheet
            open={sheetOpen} onClose={()=>setSheetOpen(false)}
            familyId={FAMILY_ID} members={members} categories={categories}
            onSaved={()=>setSheetOpen(false)}
          />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

  </script>
</body>
</html>
