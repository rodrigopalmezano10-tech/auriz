<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Auriz — finanças da família</title>
  <link rel="icon" href="../../assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../../colors_and_type.css">
  <style>
    html, body, #root { height: 100%; margin: 0; }
    body { background: var(--paper); font-family: var(--font-sans); color: var(--ink); -webkit-font-smoothing: antialiased; }
    * { box-sizing: border-box; }
    button { font-family: inherit; }
    [data-screen-label] { isolation: isolate; }
  </style>

  <!-- SheetJS — leitura de .xlsx/.xlsm para importação de transações -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>

  <!-- React 18 -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Auriz API client (Cloudflare Worker) -->
  <script src="api.js"></script>

  <!-- Constantes globais disponíveis para todos os JSX -->
  <script>
    window.MONTHS_PT = ["janeiro","fevereiro","março","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"];
  </script>
</head>
<body>
  <div id="root"></div>

  <!-- DB layer -->
  <script type="text/babel" src="db.jsx"></script>

  <!-- Design system -->
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="atoms.jsx"></script>

  <!-- Layout chrome -->
  <script type="text/babel" src="Sidebar.jsx"></script>
  <script type="text/babel" src="TopBar.jsx"></script>

  <!-- Auth screens -->
  <script type="text/babel" src="LoginScreen.jsx"></script>
  <script type="text/babel" src="SetupScreen.jsx"></script>

  <!-- Sheets -->
  <script type="text/babel" src="AddTransactionSheet.jsx"></script>
  <script type="text/babel" src="ImportSheet.jsx"></script>

  <!-- Telas -->
  <script type="text/babel" src="DashboardScreen.jsx"></script>
  <script type="text/babel" src="TransactionsScreen.jsx"></script>
  <script type="text/babel" src="GoalsScreen.jsx"></script>
  <script type="text/babel" src="EconomiasScreen.jsx"></script>
  <script type="text/babel" src="CategoriasScreen.jsx"></script>
  <script type="text/babel" src="TetoScreen.jsx"></script>
  <script type="text/babel" src="MembrosScreen.jsx"></script>
  <script type="text/babel" src="DashboardAnalyticsScreen.jsx"></script>
  <script type="text/babel" src="AdminUsuariosScreen.jsx"></script>

  <!-- App shell -->
  <script type="text/babel" data-presets="env,react">

    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { err: null }; }
      static getDerivedStateFromError(err) { return { err }; }
      render() {
        if (this.state.err) {
          return (
            <div style={{ padding: 40, fontFamily: "monospace", maxWidth: 720, margin: "40px auto" }}>
              <div style={{ fontSize: 18, fontWeight: 600, color: "#b91c1c", marginBottom: 12 }}>
                Erro ao renderizar esta tela
              </div>
              <pre style={{ background: "#fef2f2", border: "1px solid #fca5a5", borderRadius: 8,
                padding: 16, fontSize: 13, whiteSpace: "pre-wrap", wordBreak: "break-word" }}>
                {this.state.err.message}{"\n\n"}{this.state.err.stack}
              </pre>
              <button onClick={() => this.setState({ err: null })}
                style={{ marginTop: 16, padding: "8px 20px", background: "#1c1917", color: "#fff",
                  border: "none", borderRadius: 8, cursor: "pointer", fontSize: 14 }}>
                Tentar novamente
              </button>
            </div>
          );
        }
        return this.props.children;
      }
    }

    const AppLoading = () => (
      <div style={{ height: "100vh", display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column", gap: 20 }}>
        <Logo size={42} />
        <Spinner size={24} />
      </div>
    );

    function App() {
      // stage: 'loading' | 'auth' | 'setup' | 'app'
      const [stage, setStage]           = React.useState("loading");
      const [familyId, setFamilyId]     = React.useState(null);
      const [members, setMembers]       = React.useState([]);
      const [categories, setCategories] = React.useState([]);

      const [active, setActive]       = React.useState("hoje");
      const [month, setMonth]         = React.useState(new Date().getMonth());
      const [year, setYear]           = React.useState(new Date().getFullYear());
      const [sheetOpen, setSheetOpen]   = React.useState(false);
      const [editTx, setEditTx]         = React.useState(null);
      const [viewMember, setViewMember] = React.useState("all");

      const handleEditTransaction = (tx) => { setEditTx(tx); setSheetOpen(true); };
      const handleSheetClose = () => { setSheetOpen(false); setEditTx(null); };

      const init = React.useCallback(async () => {
        setStage("loading");
        const token = API.getToken();
        if (!token) { setStage("auth"); return; }
        try {
          const fam = await DB.getFamilyByUserId();
          if (!fam) { setStage("setup"); return; }
          setFamilyId(fam.id);
          const [m, c] = await Promise.all([
            DB.getMembers(fam.id),
            DB.getCategories(fam.id),
          ]);
          setMembers(m); setCategories(c);
          setStage("app");
        } catch (e) {
          API.setToken(null);
          setStage("auth");
        }
      }, []);

      React.useEffect(() => { init(); }, [init]);

      const refreshFamily = () => {
        Promise.all([
          DB.getMembers(familyId),
          DB.getCategories(familyId),
        ]).then(([m, c]) => { setMembers(m); setCategories(c); });
      };

      const shiftMonth = (delta) => {
        setMonth(prev => {
          let m = prev + delta;
          if (m < 0)  { setYear(y => y - 1); return 11; }
          if (m > 11) { setYear(y => y + 1); return 0; }
          return m;
        });
      };

      // ── Auth gates ───────────────────────────────────────────────────
      if (stage === "loading") return <AppLoading />;
      if (stage === "auth")    return <LoginScreen onLogin={init} />;
      if (stage === "setup")   return <SetupScreen onDone={init} />;

      // ── Main app ─────────────────────────────────────────────────────
      const titles = {
        hoje:       { title: "Hoje",           subtitle: `${MONTHS_PT[month]} · ${new Date().toLocaleDateString("pt-BR", { weekday: "long" })}`.toLowerCase() },
        transacoes: { title: "Transações",     subtitle: `tudo o que entrou e saiu em ${MONTHS_PT[month].toLowerCase()}` },
        dashboard:  { title: "Dashboard",      subtitle: "indicadores e padrões do mês" },
        economias:  { title: "Economias",      subtitle: "o que vocês têm guardado" },
        metas:      { title: "Metas",          subtitle: "os planos da família" },
        categorias: { title: "Categorias",     subtitle: "como vocês organizam o gasto" },
        teto:       { title: "Teto de gastos", subtitle: "limites por categoria" },
        membros:    { title: "Membros",        subtitle: "quem participa do orçamento" },
        usuarios:   { title: "Usuários",       subtitle: "acesso e permissões do painel" },
      };

      const renderScreen = () => {
        const p = { familyId, month, year };
        switch (active) {
          case "hoje":
            return <DashboardScreen {...p} members={members} onAddTransaction={() => setSheetOpen(true)} onEditTransaction={handleEditTransaction} onNav={setActive} />;
          case "transacoes":
            return <TransactionsScreen {...p} members={members} categories={categories} onAddTransaction={() => setSheetOpen(true)} onEditTransaction={handleEditTransaction} />;
          case "dashboard":
            return <DashboardAnalyticsScreen {...p} />;
          case "economias":
            return <EconomiasScreen {...p} members={members} />;
          case "metas":
            return <GoalsScreen {...p} members={members} />;
          case "categorias":
            return <CategoriasScreen familyId={familyId} />;
          case "teto":
            return <TetoScreen {...p} />;
          case "membros":
            return <MembrosScreen {...p} onMembersChange={refreshFamily} />;
          case "usuarios":
            return <AdminUsuariosScreen familyId={familyId} members={members} onMembersChange={refreshFamily} />;
          default:
            return null;
        }
      };

      return (
        <div style={{ display: "flex", minHeight: "100vh" }} data-screen-label={`Auriz · ${titles[active]?.title || active}`}>
          <Sidebar active={active} onNav={setActive} members={members}
            onLogout={() => { DB.signOut(); setStage("auth"); }} />
          <main style={{ flex: 1, display: "flex", flexDirection: "column", minWidth: 0 }}>
            <TopBar
              title={titles[active]?.title || ""}
              subtitle={titles[active]?.subtitle || ""}
              month={month} year={year} onMonth={shiftMonth}
              onAddTransaction={() => setSheetOpen(true)}
            />
            <div style={{ flex: 1 }}><ErrorBoundary>{renderScreen()}</ErrorBoundary></div>
          </main>
          <AddTransactionSheet
            open={sheetOpen}
            onClose={handleSheetClose}
            familyId={familyId}
            members={members}
            categories={categories}
            editTx={editTx}
            onSaved={handleSheetClose}
          />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
